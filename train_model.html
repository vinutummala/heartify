{% extends 'SProvider/design1.html' %}
{% load static %}
{% block researchblock %}

<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Righteous|Fredoka+One" rel="stylesheet">
<link rel="icon" href="{% static 'images/icon.png' %}" type="image/x-icon" />

<style>
    body {
        background-color: #eef2f7;
        font-family: 'Righteous', sans-serif;
    }

    .results-container {
        padding: 50px 15px;
        display: flex;
        justify-content: center;
    }

    .results-card {
        width: 100%;
        max-width: 850px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        animation: fadeIn 0.6s ease-in-out;
    }

    .results-header {
        background: linear-gradient(135deg, #e63946, #b91d2c);
        color: #ffffff;
        text-align: center;
        padding: 22px;
    }

    .results-header h2 {
        margin: 0;
        font-size: 1.5rem;
        font-family: 'Fredoka One', cursive;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .results-body {
        padding: 30px;
    }

    .table {
        margin-bottom: 0;
        border-radius: 12px;
        overflow: hidden;
    }

    .table thead th {
        background-color: #e63946;
        color: #ffffff;
        text-align: center;
        font-size: 0.9rem;
        text-transform: uppercase;
        border: none;
        letter-spacing: 0.5px;
    }

    .table tbody td {
        text-align: center;
        color: #1d3557;
        font-size: 1rem;
        font-weight: 600;
        vertical-align: middle;
    }

    .table tbody tr:nth-child(even) {
        background-color: #f8f9fa;
    }

    .table tbody tr:hover {
        background-color: #ffe5e5;
        transition: all 0.3s ease;
    }

    .no-data {
        text-align: center;
        color: #e63946;
        font-weight: bold;
        padding: 20px;
        font-size: 1rem;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .results-header h2 {
            font-size: 1.2rem;
        }

        .results-body {
            padding: 15px;
        }

        .table {
            font-size: 0.85rem;
        }
    }
</style>

<div class="container-fluid results-container">
    <div class="results-card">

        <div class="results-header">
            <h2>Trained and Tested Traffic Data Sets Results</h2>
        </div>

        <div class="results-body">
            <form method="POST">
                {% csrf_token %}
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>Model Type</th>
                                <th>Accuracy (%)</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for object in objs %}
                            <tr>
                                <td>{{ object.names }}</td>
                                <td>{{ object.ratio }}</td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="2" class="no-data">
                                    No Results Available
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </form>
        </div>

    </div>
</div>

{% endblock %}
