{% extends 'RUser/design.html' %}
{% load static %}
{% block userblock %}

<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Righteous|Fredoka+One|Lobster" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
        font-family: 'Righteous', sans-serif;
    }

    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px 20px;
    }

    .login-card {
        width: 100%;
        max-width: 500px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .login-header {
        background: linear-gradient(135deg, #e63946, #b91d2c);
        color: #ffffff;
        text-align: center;
        padding: 30px 20px;
    }

    .login-header h2 {
        margin: 0;
        font-size: 1.5rem;
        font-family: 'Fredoka One', cursive;
        letter-spacing: 1px;
    }

    .login-header p {
        font-size: 0.9rem;
        margin-top: 5px;
    }

    .login-body {
        padding: 35px;
        text-align: center;
    }

    .login-body img {
        width: 110px;
        margin-bottom: 15px;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        font-size: 0.95rem;
        border: 1px solid #ced4da;
        margin-bottom: 15px;
    }

    .form-control:focus {
        border-color: #e63946;
        box-shadow: 0 0 6px rgba(230, 57, 70, 0.3);
    }

    .btn-login {
        background: #1d3557;
        color: #ffffff;
        border: none;
        border-radius: 30px;
        padding: 12px;
        width: 100%;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .btn-login:hover {
        background: #e63946;
        transform: translateY(-2px);
    }

    .user-login-link {
        text-align: center;
        margin-top: 20px;
    }

    .user-login-link a {
        background: #e63946;
        color: #ffffff;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .user-login-link a:hover {
        background: #1d3557;
        color: #ffffff;
    }

    @media (max-width: 768px) {
        .login-body {
            padding: 25px;
        }
    }
</style>

<div class="container login-container">
    <div class="login-card">

        <div class="login-header">
            <h2>Service Provider Login</h2>
            <p>Secure Access to Heartify System</p>
        </div>

        <div class="login-body">
            <form method="POST" role="form">
                {% csrf_token %}

                <img src="{% static 'login.jpg' %}" alt="Service Provider">

                <div class="form-group">
                    <input type="text" name="username" class="form-control"
                           placeholder="User Name" required>
                </div>

                <div class="form-group">
                    <input type="password" name="password" class="form-control"
                           placeholder="Password" required>
                </div>

                <input type="submit" name="submit1" class="btn-login" value="Login">
            </form>

            <div class="user-login-link">
                <a href="{% url 'login' %}">User Login</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
