{% extends 'RUser/design.html' %}
{% load static %}
{% block userblock %}

<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Righteous|Fredoka+One|Lobster" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
        font-family: 'Righteous', sans-serif;
    }

    .register-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
    }

    .register-card {
        width: 100%;
        max-width: 750px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .register-header {
        background: linear-gradient(135deg, #e63946, #b91d2c);
        color: white;
        text-align: center;
        padding: 30px 20px;
    }

    .register-header h2 {
        font-family: 'Fredoka One', cursive;
        font-size: 1.6rem;
        margin: 0;
        letter-spacing: 1px;
    }

    .register-header p {
        font-size: 0.9rem;
        margin-top: 5px;
    }

    .register-body {
        padding: 40px;
    }

    .form-group label {
        font-weight: 600;
        color: #e63946;
        font-size: 0.85rem;
        text-transform: uppercase;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        font-size: 0.95rem;
        border: 1px solid #ced4da;
    }

    .form-control:focus {
        border-color: #e63946;
        box-shadow: 0 0 6px rgba(230, 57, 70, 0.3);
    }

    .btn-register {
        background: #1d3557;
        color: #ffffff;
        border: none;
        border-radius: 30px;
        padding: 12px;
        width: 100%;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .btn-register:hover {
        background: #e63946;
        transform: translateY(-2px);
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
    }

    .login-link a {
        background: #e63946;
        color: #ffffff;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .login-link a:hover {
        background: #1d3557;
    }

    .register-image {
        text-align: center;
        margin-bottom: 15px;
    }

    .register-image img {
        width: 110px;
    }

    @media (max-width: 768px) {
        .register-body {
            padding: 25px;
        }
    }
</style>

<div class="container register-container">
    <div class="register-card">

        <div class="register-header">
            <h2>Register Your Details</h2>
            <p>Early Detection of Cardiac Arrest in Newborn Babies</p>
        </div>

        <div class="register-body">
            <form method="POST">
                {% csrf_token %}

                <div class="register-image">
                    <img src="{% static 'Register.jpg' %}" alt="Register Image">
                </div>

                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter User Name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter Email Address" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="number" name="phoneno" class="form-control" placeholder="Enter Mobile Number" required>
                </div>

                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country" class="form-control" placeholder="Enter Country" required>
                </div>

                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state" class="form-control" placeholder="Enter State" required>
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" class="form-control" placeholder="Enter City" required>
                </div>

                <button type="submit" name="submit" class="btn-register">
                    Sign Up
                </button>
            </form>

            <div class="login-link">
                <a href="{% url 'login' %}">User Login</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
