{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Righteous|Fredoka+One" rel="stylesheet">

<style>
    body {
        background-color: #eef2f7;
        font-family: 'Righteous', sans-serif;
    }

    .chart-container-wrapper {
        max-width: 1100px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .chart-header {
        background: linear-gradient(135deg, #e63946, #b91d2c);
        color: #ffffff;
        text-align: center;
        padding: 20px;
        font-family: 'Fredoka One', cursive;
    }

    .chart-header h2 {
        margin: 0;
        font-size: 1.5rem;
    }

    .chart-body {
        padding: 30px;
        text-align: center;
    }

    .chart-menu {
        text-align: center;
        margin-bottom: 20px;
    }

    .chart-menu a {
        text-decoration: none;
        background: #1d3557;
        color: white;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 25px;
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
        display: inline-block;
    }

    .chart-menu a:hover {
        background: #e63946;
    }

    #chartContainer {
        width: 100%;
        height: 400px;
    }

    @media (max-width: 768px) {
        .chart-header h2 {
            font-size: 1.2rem;
        }

        #chartContainer {
            height: 300px;
        }
    }
</style>

<script>
window.onload = function () {

    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        title: {
            text: ""
        },
        data: [{
            {% if chart_type == "line" %}
                type: "line",
            {% elif chart_type == "pie" %}
                type: "pie",
            {% elif chart_type == "spline" %}
                type: "spline",
            {% else %}
                type: "column",
            {% endif %}
            startAngle: 240,
            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label} {y}",
            dataPoints: [
                {% for o in form %}
                    { y: {{ o.dcount }}, label: "{{ o.names }}" },
                {% endfor %}
            ]
        }]
    });

    chart.render();
};
</script>

<div class="chart-container-wrapper">
    <div class="chart-header">
        <h2>Trained and Tested Accuracy Results</h2>
    </div>

    <div class="chart-body">
        <div class="chart-menu">
            <a href="{% url 'charts1' 'pie' %}">Pie Chart</a>
            <a href="{% url 'charts1' 'line' %}">Line Chart</a>
            <a href="{% url 'charts1' 'spline' %}">Spline Chart</a>
        </div>

        <div id="chartContainer"></div>
    </div>
</div>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>

<script>
window.onload = function () {

    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        theme: "light2",
        title: {
            text: "Trained and Tested Accuracy Results"
        },
        data: [{
            {% if chart_type == "line" %}
                type: "line",
            {% elif chart_type == "pie" %}
                type: "pie",
            {% elif chart_type == "spline" %}
                type: "spline",
            {% else %}
                type: "column",
            {% endif %}
            startAngle: 240,
            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label} {y}",
            dataPoints: [
                {% for o in form %}
                    { y: {{ o.dcount|default:0 }}, label: "{{ o.names }}" }{% if not forloop.last %},{% endif %}
                {% empty %}
                    { y: 0, label: "No Data" }
                {% endfor %}
            ]
        }]
    });

    chart.render();
};
</script>

{% endblock %}
